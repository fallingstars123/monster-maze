<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Monster Maze</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    .panel { display: grid; gap: 8px; margin-top: 12px; }
    textarea, input { font: inherit; padding: 8px; }
    button { font: inherit; padding: 10px 14px; cursor: pointer; }
    .board {
      font-size: 22px;
      line-height: 1.35;
      white-space: pre;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: #111;
      color: #f5f5f5;
      max-width: 100%;
      overflow-x: auto;
    }
    .log {
      white-space: pre-wrap;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
      min-height: 70px;
    }
    .kbd { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; padding: 2px 6px; border: 1px solid #ccc; border-radius: 6px; background: #fff; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; }

    .mobile-controls{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:12px;
  align-items:flex-start;
}

.dpad{
  display:grid;
  grid-template-columns: 72px 72px 72px;
  grid-template-rows: 72px 72px 72px;
  gap:10px;
  align-items:center;
  justify-items:center;
  touch-action: manipulation; /* 更适合手机 */
}

.dpad-btn{
  width:72px;
  height:72px;
  border-radius:16px;
  border:1px solid #ccc;
  background:#fff;
  font-size:20px;
  font-weight:700;
}

.dpad-btn:active{
  transform: scale(0.98);
}

.dpad-btn.up{ grid-column:2; grid-row:1; }
.dpad-btn.left{ grid-column:1; grid-row:2; }
.dpad-center{ grid-column:2; grid-row:2; width:72px; height:72px; }
.dpad-btn.right{ grid-column:3; grid-row:2; }
.dpad-btn.down{ grid-column:2; grid-row:3; }

.hint{ opacity:0.8; }

@media (max-width: 520px){
  .dpad{
    grid-template-columns: 84px 84px 84px;
    grid-template-rows: 84px 84px 84px;
  }
  .dpad-btn{
    width:84px;
    height:84px;
    font-size:22px;
  }
  .dpad-center{
    width:84px;
    height:84px;
  }
}
  </style>
</head>
<body>
  <h1>Monster Maze 😎😈🚩</h1>

  <div class="panel">
    <div class="row">
      <label>Grid (rows,cols): <input id="size" value="6,6" /></label>
      <label>Start (row,col): <input id="start" value="5,0" /></label>
      <label>Goal (row,col): <input id="goal" value="0,5" /></label>
      <label>Seed: <input id="seed" value="CS 180 - HW 06" /></label>
      <label style="display:flex; gap:8px; align-items:center;">
        <input id="manualMonsters" type="checkbox" />
        Manual monsters
        </label>
        <button id="btnNewSeed" type="button">🎲 New Seed</button>
    </div>
    <div class="row">
      <label>Monsters (one per line row,col):</label>
    </div>
    <textarea id="monsters" rows="4">2,2
4,4</textarea>

    <div id="board" class="board"></div>

    <div class="mobile-controls">
    <button id="btnStart">Start / Restart</button>

    <div class="dpad" aria-label="Movement controls">
        <button class="dpad-btn up" data-move="W">W</button>
        <button class="dpad-btn left" data-move="A">A</button>
        <button class="dpad-btn down" data-move="S">S</button>
        <button class="dpad-btn right" data-move="D">D</button>
        <div class="dpad-center"></div>
    </div>

    <div class="hint">Keyboard: <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span></div>
    </div>

    <div id="log" class="log"></div>

<script>
  const EMOJI = {
    player: "😎",
    monster: "😈",
    goal: "🚩",
    empty: "⬜",
    multi: "💀"
  };

  let state = null;

  function parsePair(str) {
    const parts = str.split(",").map(s => s.trim());
    if (parts.length !== 2) throw new Error("Bad pair: " + str);
    const a = Number(parts[0]), b = Number(parts[1]);
    if (!Number.isInteger(a) || !Number.isInteger(b)) throw new Error("Not ints: " + str);
    return [a, b];
  }
  

  function clampInBounds([r,c], rows, cols) {
    return (r >= 0 && r < rows && c >= 0 && c < cols);
  }

  function mulberry32(a) {
    return function() {
        let t = a += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
  }

  function generateLevelFromSeed(seedValue) {
    const rng = mulberry32(seedValue);
    // 1) map size: 3..10
    const rows = Math.floor(rng() * 8) + 3; // 3-10
    const cols = Math.floor(rng() * 8) + 3; // 3-10

    // 2) start & goal (not same)
    const start = { r: Math.floor(rng() * rows), c: Math.floor(rng() * cols) };
    let goal;
    do {
      goal = { r: Math.floor(rng() * rows), c: Math.floor(rng() * cols) };
    } while (goal.r === start.r && goal.c === start.c);

    // 3) monster count (area-based, reasonable)
    const cells = rows * cols;
    let minM = Math.max(1, Math.floor(cells / 14));
    let maxM = Math.max(minM, Math.floor(cells / 6));
    maxM = Math.min(maxM, cells - 3); // leave space
    const mCount = Math.floor(rng() * (maxM - minM + 1)) + minM;

    // 4) monster positions (unique, not on start/goal)
    const used = new Set([`${start.r},${start.c}`, `${goal.r},${goal.c}`]);
    const monsters = [];
    let guard = 0;
    while (monsters.length < mCount && guard < 5000) {
      guard++;
      const r = Math.floor(rng() * rows);
      const c = Math.floor(rng() * cols);
      const key = `${r},${c}`;
      if (used.has(key)) continue;
      used.add(key);
      monsters.push({ r, c });
    }

    return { rows, cols, start, goal, monsters };
  }

  function startGame() {
    const seedValue = Number(document.getElementById("seed").value) || 1;
    const manual = document.getElementById("manualMonsters")?.checked; // 你现在的checkbox

    let rows, cols, p, g, monsters;

    if (!manual) {
      // ✅ 默认：seed 控制整张地图
      const lvl = generateLevelFromSeed(seedValue);

      rows = lvl.rows;
      cols = lvl.cols;
      p = [lvl.start.r, lvl.start.c];
      g = [lvl.goal.r, lvl.goal.c];
      monsters = lvl.monsters.map(m => [m.r, m.c]);

      // 可选：把生成结果回填到输入框（方便你“看到关卡长啥样”）
      document.getElementById("size").value = `${rows},${cols}`;
      document.getElementById("start").value = `${p[0]},${p[1]}`;
      document.getElementById("goal").value = `${g[0]},${g[1]}`;
      document.getElementById("monsters").value = monsters.map(x => `${x[0]},${x[1]}`).join("\n");

    } else {
      // ✅ 手动：按输入框
      [rows, cols] = parsePair(document.getElementById("size").value);
      p = parsePair(document.getElementById("start").value);
      g = parsePair(document.getElementById("goal").value);

      const monsterLines = document.getElementById("monsters").value
        .split("\n").map(s => s.trim()).filter(Boolean);
      monsters = monsterLines.map(parsePair);
    }

    // checks
    if (rows <= 0 || cols <= 0) throw new Error("Grid must be positive.");
    if (!clampInBounds(p, rows, cols)) throw new Error("Start out of bounds.");
    if (!clampInBounds(g, rows, cols)) throw new Error("Goal out of bounds.");
    for (const m of monsters) if (!clampInBounds(m, rows, cols)) throw new Error("Monster out of bounds: " + m.join(","));

    state = {
      rows, cols,
      p: { r: p[0], c: p[1] },
      g: { r: g[0], c: g[1] },
      monsters: monsters.map(([r,c]) => ({ r, c })),
      ended: false,
      msg: manual ? "Manual level started." : `Seed level started (seed=${seedValue}).`
    };

    render();
  }

  function movePlayer(dir) {
    if (!state || state.ended) return;
    const { rows, cols, p } = state;

    let nr = p.r, nc = p.c;
    dir = dir.toUpperCase();

    if (dir === "W") nr--;
    else if (dir === "S") nr++;
    else if (dir === "A") nc--;
    else if (dir === "D") nc++;
    else { state.msg = "Invalid input."; return; }

    // bounds check
    if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) {
      state.msg = "Invalid move! You hit a wall, but the monsters keep moving...";
      // player stays
    } else {
      p.r = nr; p.c = nc;
      state.msg = "Moved " + dir + ".";
    }

    // monsters move up by one (row - 1), loop to bottom
    for (const m of state.monsters) {
      m.r -= 1;
      if (m.r < 0) m.r = rows - 1;
    }

    // collision check AFTER monsters move (matches your assignment order)
    for (const m of state.monsters) {
      if (m.r === p.r && m.c === p.c) {
        state.ended = true;
        state.msg = "A monster caught you! Game Over.";
        render();
        return;
      }
    }

    // win check
    if (p.r === state.g.r && p.c === state.g.c) {
      state.ended = true;
      state.msg = "Congratulations! You reached the goal!";
    }

    render();
  }

  function render() {
    const boardEl = document.getElementById("board");
    const logEl = document.getElementById("log");

    if (!state) {
      boardEl.textContent = "Click Start.";
      logEl.textContent = "";
      return;
    }

    const { rows, cols, p, g, monsters } = state;

    // build a board string without storing a board as state
    let out = "";
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (p.r === r && p.c === c) { out += EMOJI.player + " "; continue; }

        // count monsters at this cell
        let count = 0;
        for (const m of monsters) if (m.r === r && m.c === c) count++;

        if (count >= 2) out += EMOJI.multi + " ";
        else if (count === 1) out += EMOJI.monster + " ";
        else if (g.r === r && g.c === c) out += EMOJI.goal + " ";
        else out += EMOJI.empty + " ";
      }
      out += "\n";
    }

    boardEl.textContent = out;
    logEl.textContent = state.msg + (state.ended ? "\n\nThank you for playing!" : "");
  }

  // UI wiring
  document.getElementById("btnStart").addEventListener("click", () => {
    try { startGame(); }
    catch (e) { alert(e.message); }
  });
    document.getElementById("btnNewSeed").addEventListener("click", () => {
    // 生成一个 1~1e9 的整数种子
    const newSeed = Math.floor(Math.random() * 1_000_000_000) + 1;
    document.getElementById("seed").value = String(newSeed);

    // 默认用 seed（如果你希望按一次就回到 seed 模式）
    document.getElementById("manualMonsters").checked = false;

    // 直接重开局
    try { startGame(); }
    catch (e) { alert(e.message); }
    });
    document.querySelectorAll("button[data-move]").forEach(btn => {
        btn.addEventListener("click", () => movePlayer(btn.dataset.move));
    });

    window.addEventListener("keydown", (e) => {
    const key = e.key;          // "w", "ArrowUp", etc.
    const code = e.code;        // "KeyW", "ArrowUp", etc.

    const map = {
        // WASD by key
        "w": "W", "a": "A", "s": "S", "d": "D",
        "W": "W", "A": "A", "S": "S", "D": "D",

        // Arrow keys by key
        "ArrowUp": "W",
        "ArrowLeft": "A",
        "ArrowDown": "S",
        "ArrowRight": "D",

        // WASD by code (more robust on some layouts)
        "KeyW": "W",
        "KeyA": "A",
        "KeyS": "S",
        "KeyD": "D",
    };

    const dir = map[key] || map[code];
    if (dir) {
        e.preventDefault(); // 防止方向键滚动页面
        movePlayer(dir);
    }
    });

  // auto start once
  try { startGame(); } catch {}

  
</script>
</body>
</html>
